# Extension metadata
name=Channel Names Viewer
description=A small always-visible legend window showing the currently selected fluorescence channels. Updates live as channels are toggled in Brightness/Contrast.

# Menu items
menu.open=Channel Names Viewer...

# Tooltips (toolbar + menu)
# Wording is "Toggle ..." because all three launch surfaces (toolbar button,
# menu item, accelerator) toggle the legend window: clicking when shown closes
# it. See user-guide section 2.2 ("Pressing the shortcut a second time toggles
# the window closed; the toolbar button and menu item also toggle.").
tooltip.toolbar=Toggle the Channel Names viewer (Ctrl+Shift+C).
tooltip.menu=Toggle a small always-visible legend showing currently selected fluorescence channels.
tooltip.window.body=Drag title bar to move. Double-click to close.

# Empty-state strings
empty.headline=No fluorescence channels
empty.subtitle.rgb=(this image is RGB; channels do not apply)
empty.subtitle.noImage=(open an image to see its channels)
empty.subtitle.zeroSelected=(open Brightness/Contrast and select channels)

# Window title (shown in UTILITY title bar)
window.title=Channel Names
